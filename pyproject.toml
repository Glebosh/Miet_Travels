[tool.ruff]
  line-length = 100                                                                                                                                                                                                                              
  target-version = "py313"                                                                                                                                                                                                                     
  exclude = [                                                                                                                                                                                                                                    
    "**/migrations/**",
    "**/__pycache__/**",                                                                                                                                                                                                                         
    "src/theme/**",                                                                                                                                                                                                                            
  ]

  [tool.ruff.lint]
  select = ["E", "W", "F", "I", "UP", "B", "DJ"]
                                                                                                                                                                                                                                                 
  [tool.ruff.lint.per-file-ignores]                                                                                                                                                                                                              
  "src/mysite/settings.py" = ["E501"] 