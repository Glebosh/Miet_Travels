{% extends 'base.html' %}
{% load static %}

{% block title %}Обратная связь{% endblock %}

{% block content %}
<h1 class="page-title">Обратная связь</h1>

<div class="feedback-form">
    <form method="get">
        <div class="form-group feedback-photo">
            <img src="{% static 'travels/img.jpg' %}" alt="Фото пользователя" class="feedback-photo">
        </div>

        <div class="form-group">
            <label for="name">Ваше имя *</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">Ваш email *</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="message">Ваше сообщение *</label>
            <textarea id="message" name="message" required placeholder="Расскажите нам, что вы думаете о нашем сервисе..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Отправить</button>
    </form>
</div>

<h2 class="page-title" style="margin-top: 3rem;">Заранее благодарим за вашу обратную связь! А вот видео от нашего спонсора:</h2>
<div class="video-container">
    <video width="100%" height="auto" controls poster="{% static 'travels/img.jpg' %}">
        <source src="{% static 'travels/video.mp4' %}" type="video/mp4">
        Ваш браузер не поддерживает встроенные видео. 
        <a href="{% static 'travels/video.mp4' %}">Скачайте видео</a>, чтобы посмотреть его.
    </video>
</div>
{% endblock %}
