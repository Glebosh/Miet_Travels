{% extends 'base.html' %}
{% load static %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="auth-container">
    <h1 class="page-title">Вход в систему</h1>
    
    <div class="reg-form">
        <form id="loginForm" class="styled-form" method="post" novalidate>
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.com">
                <span class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="password">Пароль *</label>
                <input type="password" id="password" name="password" required placeholder="Введите ваш пароль">
                <span class="error-msg"></span>
            </div>

            <button type="submit" class="submit-btn">Войти</button>
            
            <div style="margin-top: 1rem; text-align: center;">
                <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'travels/js/validation.js' %}"></script>
{% endblock %}
