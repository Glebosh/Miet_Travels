{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-container">
    <h1 class="page-title">Регистрация пользователя</h1>
    
    <div class="reg-form">
        <form id="regForm" class="styled-form" method="post" novalidate>
            {% csrf_token %}
            
            <div class="form-group">
                <label for="first_name">Имя *</label>
                <input type="text" id="first_name" name="first_name" required 
                    placeholder="Напр: Иван" data-error="Только буквы, первая - заглавная">
                <span class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="last_name">Фамилия *</label>
                <input type="text" id="last_name" name="last_name" required 
                    placeholder="Напр: Иванов">
                <span class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.com">
                <span class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="age">Возраст (от 18 до 100) *</label>
                <input type="number" id="age" name="age" min="18" max="100" required>
                <span class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="phone">Телефон (необязательно)</label>
                <input type="tel" id="phone" name="phone">
            </div>

            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'travels/js/validation.js' %}"></script>
{% endblock %}
