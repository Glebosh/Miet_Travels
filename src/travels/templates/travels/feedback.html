{% extends 'base.html' %}
{% load static %}

{% block title %}Обратная связь{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <h1 class="text-3xl text-center font-bold text-[oklch(42.1%_0.095_57.708)] mb-2">Обратная связь</h1>
    <p class="text-gray-500 text-center mb-8">Расскажите, что вы думаете о нашем сервисе</p>

    <div class="bg-white border border-amber-200 rounded-2xl shadow-sm overflow-hidden">

        <div class="flex justify-center pt-8 pb-4">
            <img src="{% static 'travels/img.jpg' %}" alt="Фото пользователя"
                 class="w-24 h-24 rounded-full object-cover border-4 border-amber-200 shadow-sm">
        </div>

        <div class="px-8 pb-8">
            <form method="POST" action="{% url 'send-feedback' %}" class="flex flex-col gap-5">

                <div class="flex flex-col gap-1">
                    <label for="name" class="text-sm font-semibold text-[oklch(42.1%_0.095_57.708)]">Ваше имя *</label>
                    <input type="text" id="name" name="name" required
                           placeholder="Введите ваше имя"
                           class="w-full px-4 py-2.5 border border-amber-200 rounded-lg text-sm bg-orange-50
                                  focus:outline-none focus:ring-2 focus:ring-amber-300 focus:border-amber-300
                                  placeholder:text-gray-400 transition">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="email" class="text-sm font-semibold text-[oklch(42.1%_0.095_57.708)]">Ваш email *</label>
                    <input type="email" id="email" name="email" required
                           placeholder="example@gmail.com"
                           class="w-full px-4 py-2.5 border border-amber-200 rounded-lg text-sm bg-orange-50
                                  focus:outline-none focus:ring-2 focus:ring-amber-300 focus:border-amber-300
                                  placeholder:text-gray-400 transition">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="message" class="text-sm font-semibold text-[oklch(42.1%_0.095_57.708)]">Ваше сообщение *</label>
                    <textarea id="message" name="message" required rows="5"
                              placeholder="Расскажите нам, что вы думаете о нашем сервисе..."
                              class="w-full px-4 py-2.5 border border-amber-200 rounded-lg text-sm bg-orange-50
                                     focus:outline-none focus:ring-2 focus:ring-amber-300 focus:border-amber-300
                                     placeholder:text-gray-400 transition resize-none"></textarea>
                </div>

                <button type="submit"
                        class="w-full bg-amber-400 hover:bg-amber-500 text-white font-bold py-3 rounded-lg transition-colors">
                    Отправить
                </button>

            </form>
        </div>
    </div>

</div>
{% endblock %}
