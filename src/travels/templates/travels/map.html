{% extends 'base.html' %}
{% block content %}
<div class="px-4 py-8">
    <div id="map" style="width: 100%; height: 600px;" 
         class="rounded-2xl overflow-hidden border border-amber-200">
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://api-maps.yandex.ru/2.1/?apikey={{ api_key }}&lang=ru_RU" type="text/javascript"></script>
<script>
    const places = {{ addresses_json|safe }};

    ymaps.ready(function () {
        const map = new ymaps.Map('map', {
            center: [55.75, 37.61],
            zoom: 10
        });

        if (places.length > 0) {
            const multiRoute = new ymaps.multiRouter.MultiRoute(
                {
                    referencePoints: places.map(p => p.address),
                    params: {
                        routingMode: 'masstransit',
                        optimiseCriterion: 'time',
                    }
                },
                {
                    boundsAutoApply: true,
                    wayPointStartIconColor: '#f59e0b',
                    wayPointFinishIconColor: '#f59e0b',
                }
            );
            map.geoObjects.add(multiRoute);
        }

        places.forEach(place => {
            ymaps.geocode(place.address).then(function (res) {
                const coords = res.geoObjects.get(0).geometry.getCoordinates();
                const placemark = new ymaps.Placemark(coords, {
                    balloonContent: place.name,
                    hintContent: place.name,
                }, {
                    preset: 'islands#orangeStretchyIcon',
                });
                map.geoObjects.add(placemark);
            });
        });
    });
</script>
{% endblock %}
